name: Feature request
description: Suggest an idea or enhancement for Cove
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for Cove.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the need, frustration, or missing workflow.
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Describe the feature or behavior you want.
      placeholder: I'd like Cove to ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative solutions you've considered.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add mockups, examples, or related links if helpful.
    validations:
      required: false
