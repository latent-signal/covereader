name: Bug report
description: Report a reproducible problem with Cove
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: A clear and concise description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the problem.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share any relevant device, macOS, or app version details.
      placeholder: macOS version, device model, app build, feed involved, etc.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add screenshots, logs, or anything else that may help.
    validations:
      required: false
